<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATLAS - Painel de Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --atlas-gold: #ffb800;
            --atlas-dark: #12141d;
            --atlas-card: #1c1f2e;
            --atlas-border: #2d3142;
        }
        body {
            background-color: var(--atlas-dark);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 80px;
        }
        .gold-text { color: var(--atlas-gold); }
        .gold-bg { background-color: var(--atlas-gold); color: #000; }
        .card { background: var(--atlas-card); border: 1px solid var(--atlas-border); border-radius: 12px; }
        .tab-inactive { color: #6b7280; }
        .tab-active { color: var(--atlas-gold); border-bottom: 2px solid var(--atlas-gold); }
        .hidden-section { display: none; }
        input, textarea, select {
            background: #25293c !important;
            border: 1px solid var(--atlas-border) !important;
            color: white !important;
        }
        .bottom-nav {
            background: rgba(18, 20, 29, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--atlas-border);
        }
        /* Loader de salvamento */
        #sync-status { transition: opacity 0.3s; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-widest gold-text">ATLAS</h1>
            <p class="text-xs text-gray-500 uppercase tracking-tighter">Painel de Leads</p>
        </div>
        <div id="sync-status" class="text-xs text-gray-500 opacity-0">
            <i class="fa fa-sync fa-spin"></i> Sincronizando...
        </div>
    </header>

    <div id="section-home" class="p-4 space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="card p-4">
                <p class="text-[10px] uppercase text-gray-400">Total</p>
                <h2 id="stat-total" class="text-3xl font-bold gold-text">-</h2>
                <p class="text-[10px] text-gray-500">contatos</p>
            </div>
            <div class="card p-4">
                <p class="text-[10px] uppercase text-gray-400">Clientes</p>
                <h2 id="stat-clientes" class="text-3xl font-bold text-green-500">-</h2>
                <p class="text-[10px] text-gray-500">ativos</p>
            </div>
            <div class="card p-4">
                <p class="text-[10px] uppercase text-gray-400">Leads</p>
                <h2 id="stat-leads" class="text-3xl font-bold text-blue-400">-</h2>
                <p class="text-[10px] text-gray-500">potenciais</p>
            </div>
            <div class="card p-4">
                <p class="text-[10px] uppercase text-gray-400">Tarefas</p>
                <h2 id="stat-tarefas" class="text-3xl font-bold text-orange-400">-</h2>
                <p class="text-[10px] text-gray-500">pendentes</p>
            </div>
        </div>

        <div class="relative mt-4">
            <input type="text" id="search-input" placeholder="Buscar contatos..." class="w-full p-3 pl-10 rounded-xl text-sm outline-none">
            <i class="fa fa-search absolute left-3 top-3.5 text-gray-500"></i>
        </div>

        <div class="mt-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-semibold uppercase text-gray-400">— Lista de Contatos</h3>
            </div>
            <div id="contacts-list" class="space-y-3">
                <div class="text-center py-10 text-gray-600">
                    <i class="fa fa-spinner fa-spin text-4xl mb-2"></i>
                    <p>Carregando banco de dados...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="section-tasks" class="hidden-section p-4">
        <h2 class="text-lg font-bold mb-4 gold-text">Minhas Tarefas</h2>
        <form id="task-form" class="mb-6 flex gap-2">
            <input type="text" id="task-desc" placeholder="Ex: Enviar VPN para Daniel" class="w-full p-3 rounded-lg text-sm" required>
            <button type="submit" class="gold-bg px-4 rounded-lg"><i class="fa fa-plus font-bold"></i></button>
        </form>
        <div id="tasks-list" class="space-y-3"></div>
    </div>

    <div id="modal-lead" class="fixed inset-0 bg-black bg-opacity-80 hidden z-50 p-4">
        <div class="card w-full max-w-md mx-auto mt-10 p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold gold-text">Novo Lead / Cliente</h2>
                <button onclick="toggleModal('modal-lead')" class="text-gray-400"><i class="fa fa-times"></i></button>
            </div>
            <form id="lead-form" class="space-y-4">
                <input type="text" id="name" placeholder="Nome Completo" class="w-full p-3 rounded-lg text-sm" required>
                <input type="tel" id="phone" placeholder="Celular / WhatsApp" class="w-full p-3 rounded-lg text-sm" required>
                <input type="email" id="email" placeholder="Email" class="w-full p-3 rounded-lg text-sm">
                <select id="status" class="w-full p-3 rounded-lg text-sm">
                    <option value="Lead">Lead Potencial</option>
                    <option value="Cliente">Cliente Ativo</option>
                </select>
                <textarea id="notes" placeholder="Cidades, hotéis, datas de viagem..." class="w-full p-3 rounded-lg text-sm h-24"></textarea>
                <button type="submit" class="w-full gold-bg p-3 rounded-lg font-bold mt-4">SALVAR CONTATO</button>
            </form>
        </div>
    </div>

    <button onclick="toggleModal('modal-lead')" class="fixed bottom-24 right-6 w-14 h-14 gold-bg rounded-full shadow-lg flex items-center justify-center text-2xl z-40">
        <i class="fa fa-plus"></i>
    </button>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bottom-nav flex justify-around items-center px-4 z-50">
        <button onclick="showSection('home')" class="flex flex-col items-center tab-active transition-all" id="nav-home">
            <i class="fa fa-users text-xl"></i>
            <span class="text-[10px] mt-1 uppercase font-bold">Leads</span>
        </button>
        <button onclick="showSection('tasks')" class="flex flex-col items-center tab-inactive" id="nav-tasks">
            <i class="fa fa-check-double text-xl"></i>
            <span class="text-[10px] mt-1 uppercase font-bold">Tarefas</span>
        </button>
    </nav>

    <script>
        // Configurações do Banco de Dados (JSONBin)
        const JSONBIN_ID = '69f2a4cf856a6821898b51d0'; 
        const JSONBIN_KEY = '$2a$10$dhzKzcr352sQVzbe1jCeFuFSu22MYZBByhqPlCdM0YjK1J6OSi7Vq'; 
        
        const API_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;
        let db = { contacts: [], tasks: [] };

        // Mostrar aviso de salvamento
        function showSync(isSyncing) {
            document.getElementById('sync-status').style.opacity = isSyncing ? '1' : '0';
        }

        // Carregar dados da Nuvem (JSONBin)
        async function loadData() {
            try {
                const response = await fetch(`${API_URL}/latest`, {
                    headers: { 'X-Access-Key': JSONBIN_KEY }
                });
                if(!response.ok) throw new Error('Erro ao buscar dados');
                const result = await response.json();
                db = result.record || { contacts: [], tasks: [] };
                
                // Garantir que as arrays existam se o bin for vazio/novo
                if(!db.contacts) db.contacts = [];
                if(!db.tasks) db.tasks = [];
                
                renderAll();
            } catch (error) {
                console.error('Erro de conexão:', error);
                document.getElementById('contacts-list').innerHTML = `<div class="text-center py-10 text-red-500"><p>Erro ao conectar ao banco de dados. Verifique suas chaves.</p></div>`;
            }
        }

        // Salvar dados na Nuvem (JSONBin)
        async function saveData() {
            showSync(true);
            try {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Access-Key': JSONBIN_KEY
                    },
                    body: JSON.stringify(db)
                });
                renderAll();
            } catch (error) {
                alert('Erro ao salvar na nuvem!');
                console.error(error);
            } finally {
                showSync(false);
            }
        }

        // Navegação de Telas
        function showSection(section) {
            document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden-section'));
            document.getElementById('section-' + section).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active'); b.classList.add('tab-inactive');
            });
            document.getElementById('nav-' + section).classList.add('tab-active');
            document.getElementById('nav-' + section).classList.remove('tab-inactive');
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        // Adicionar Lead
        document.getElementById('lead-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newLead = {
                id: Date.now(),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value,
                dateAdded: new Date().toLocaleString('pt-BR')
            };
            db.contacts.push(newLead);
            e.target.reset();
            toggleModal('modal-lead');
            saveData();
        });

        // Adicionar Tarefa
        document.getElementById('task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('task-desc');
            db.tasks.push({ id: Date.now(), desc: input.value, done: false });
            input.value = '';
            saveData();
        });

        // Renderizar Interface
        function renderAll() {
            // Stats
            document.getElementById('stat-total').innerText = db.contacts.length;
            document.getElementById('stat-clientes').innerText = db.contacts.filter(c => c.status === 'Cliente').length;
            document.getElementById('stat-leads').innerText = db.contacts.filter(c => c.status === 'Lead').length;
            document.getElementById('stat-tarefas').innerText = db.tasks.filter(t => !t.done).length;

            // Contatos
            const list = document.getElementById('contacts-list');
            list.innerHTML = '';
            if (db.contacts.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-600"><p>Nenhum contato encontrado</p></div>`;
            } else {
                db.contacts.slice().reverse().forEach(contact => {
                    const div = document.createElement('div');
                    div.className = 'card p-4';
                    div.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-sm gold-text">${contact.name}</h4>
                                <p class="text-xs text-gray-400 mt-1"><i class="fab fa-whatsapp"></i> ${contact.phone}</p>
                                ${contact.email ? `<p class="text-xs text-gray-400 mt-1"><i class="far fa-envelope"></i> ${contact.email}</p>` : ''}
                            </div>
                            <button onclick="deleteContact(${contact.id})" class="text-red-900"><i class="fa fa-trash"></i></button>
                        </div>
                        ${contact.notes ? `<div class="mt-3 p-2 bg-[#25293c] rounded text-xs text-gray-300 whitespace-pre-line">${contact.notes}</div>` : ''}
                        <div class="mt-3 flex justify-between items-center border-t border-[#2d3142] pt-2">
                            <span class="text-[9px] px-2 py-0.5 rounded ${contact.status === 'Cliente' ? 'bg-green-900 text-green-300' : 'bg-blue-900 text-blue-300'} uppercase">
                                ${contact.status}
                            </span>
                            <span class="text-[10px] text-gray-600">${contact.dateAdded}</span>
                        </div>
                    `;
                    list.appendChild(div);
                });
            }

            // Tarefas
            const tList = document.getElementById('tasks-list');
            tList.innerHTML = '';
            db.tasks.slice().reverse().forEach(task => {
                const div = document.createElement('div');
                div.className = `card p-4 flex justify-between items-center ${task.done ? 'opacity-50' : ''}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${task.id})" class="w-4 h-4 rounded bg-[#25293c] border-[--atlas-border]">
                        <span class="text-sm ${task.done ? 'line-through text-gray-500' : ''}">${task.desc}</span>
                    </div>
                    <button onclick="deleteTask(${task.id})" class="text-red-900"><i class="fa fa-trash"></i></button>
                `;
                tList.appendChild(div);
            });
        }

        // Ações de Delete e Toggle
        function deleteContact(id) {
            if(confirm('Excluir contato permanentemente?')) {
                db.contacts = db.contacts.filter(c => c.id !== id);
                saveData();
            }
        }
        function deleteTask(id) {
            db.tasks = db.tasks.filter(t => t.id !== id);
            saveData();
        }
        function toggleTask(id) {
            const t = db.tasks.find(t => t.id === id);
            if(t) { t.done = !t.done; saveData(); }
        }

        // Iniciar
        loadData();

    </script>
</body>
</html>
