<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ATLAS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0c0e12;
  --s1: #12151b;
  --s2: #181c24;
  --s3: #1f2430;
  --border: #252c3a;
  --border2: #323d52;
  --gold: #e8a020;
  --gold2: #c8881a;
  --gold-bg: rgba(232,160,32,0.1);
  --gold-bg2: rgba(232,160,32,0.06);
  --green: #34c77b;
  --green-bg: rgba(52,199,123,0.12);
  --blue: #4a9eff;
  --blue-bg: rgba(74,158,255,0.12);
  --red: #ff5a5a;
  --red-bg: rgba(255,90,90,0.12);
  --yellow: #ffd166;
  --text: #b8c4d8;
  --text2: #6b7a94;
  --text3: #3d4a60;
  --white: #edf2fc;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
  overflow: hidden;
}
.screen.active { transform: translateX(0); }
.screen.behind { transform: translateX(-6%); }

/* ── TOP BAR ── */
.topbar {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  padding-top: max(14px, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.topbar-title {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 500;
  color: var(--white);
  flex: 1;
}
.topbar-sub {
  font-size: 11px;
  color: var(--text2);
  font-family: var(--mono);
  letter-spacing: 0.5px;
}
.back-btn {
  width: 36px; height: 36px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  font-size: 16px; color: var(--text);
  transition: all 0.15s;
}
.back-btn:active { background: var(--s3); }

/* ── SCROLL BODY ── */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(80px + var(--safe-bottom));
}
.scroll-body.no-pb { padding-bottom: 0; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 50;
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 6px 8px;
  cursor: pointer;
  gap: 4px;
  transition: all 0.15s;
}
.nav-tab .icon { font-size: 20px; }
.nav-tab .label { font-family: var(--mono); font-size: 9px; color: var(--text2); letter-spacing: 0.5px; }
.nav-tab.active .label { color: var(--gold); }
.nav-tab.active .icon { filter: brightness(1.4); }
.nav-tab-badge {
  position: relative;
  display: inline-block;
}
.badge-dot {
  position: absolute;
  top: -2px; right: -6px;
  width: 8px; height: 8px;
  background: var(--red);
  border-radius: 50%;
  border: 2px solid var(--s1);
}

/* ── LOGO SCREEN ── */
.home-logo {
  padding: 28px 20px 16px;
}
.logo-mark {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 4px;
}
.logo-sub { font-family: var(--mono); font-size: 10px; color: var(--text2); letter-spacing: 2px; margin-top: 2px; }

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 0 16px 16px;
}
.stat-box {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.stat-box.gold { border-color: rgba(232,160,32,0.3); }
.stat-box.green { border-color: rgba(52,199,123,0.3); }
.stat-label { font-family: var(--mono); font-size: 9px; color: var(--text2); letter-spacing: 2px; margin-bottom: 6px; }
.stat-val { font-family: var(--mono); font-size: 28px; font-weight: 500; color: var(--white); line-height: 1; }
.stat-box.gold .stat-val { color: var(--gold); }
.stat-box.green .stat-val { color: var(--green); }
.stat-hint { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ── SEARCH ── */
.search-wrap { padding: 0 16px 12px; }
.search-box {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  transition: border-color 0.15s;
}
.search-box:focus-within { border-color: var(--gold2); }
.search-box input {
  background: none; border: none; outline: none;
  color: var(--white); font-family: var(--sans); font-size: 14px;
  flex: 1; min-width: 0;
}
.search-box input::placeholder { color: var(--text2); }
.search-icon { color: var(--text2); font-size: 15px; flex-shrink: 0; }

/* ── FILTER CHIPS ── */
.chips {
  display: flex; gap: 8px;
  padding: 0 16px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
  padding: 6px 14px; border-radius: 20px; white-space: nowrap;
  border: 1px solid var(--border); color: var(--text2);
  background: transparent; cursor: pointer; transition: all 0.15s;
  -webkit-user-select: none; user-select: none;
}
.chip.active { background: var(--gold-bg); border-color: var(--gold2); color: var(--gold); }

/* ── LEAD LIST ── */
.section-label {
  font-family: var(--mono); font-size: 9px; color: var(--text2);
  letter-spacing: 2px; padding: 0 16px 8px;
}
.leads-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

.lead-row {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: all 0.2s;
  -webkit-user-select: none; user-select: none;
}
.lead-row:active { background: var(--s2); transform: scale(0.985); }

.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--s3); border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--gold);
  flex-shrink: 0; overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }

.lead-info { flex: 1; min-width: 0; }
.lead-name { font-size: 14px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lead-sub { font-family: var(--mono); font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lead-badges { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }

.pill {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.8px;
  padding: 2px 7px; border-radius: 10px; font-weight: 500;
}
.pill-lead { background: var(--blue-bg); color: var(--blue); }
.pill-cliente { background: var(--green-bg); color: var(--green); }
.pill-novo { background: var(--gold-bg); color: var(--gold); }
.pill-inativo { background: rgba(107,122,148,0.1); color: var(--text2); }

.lead-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.lead-date { font-family: var(--mono); font-size: 10px; color: var(--text2); }
.task-indicator { font-family: var(--mono); font-size: 10px; color: var(--gold); }

.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text2); font-family: var(--mono); font-size: 12px;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(72px + var(--safe-bottom)); right: 20px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--gold); color: #000;
  font-size: 26px; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 4px 20px rgba(232,160,32,0.4);
  z-index: 40; transition: all 0.2s;
  border: none;
}
.fab:active { transform: scale(0.92); }

/* ── DETAIL SCREEN ── */
.detail-hero {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 20px 18px;
  display: flex; align-items: center; gap: 16px;
}
.avatar-lg {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--s3); border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--gold);
  flex-shrink: 0; overflow: hidden; cursor: pointer;
}
.avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
.detail-name-block { flex: 1;
